  <!-- ✅ Yandex map init (FAqat bitta marta) -->
  <script>
    ymaps.ready(init);

    function init() {
      var map = new ymaps.Map("map", {
        center: [41.5533, 60.6317],
        zoom: 7
      });

      var filiallar = [
        { name: "Yukchi Urganch", coords: [41.553, 60.6317] },
        { name: "Yukchi Toshkent", coords: [41.2995, 69.2401] },
        { name: "Yukchi Namangan", coords: [41.0, 71.67] },
        { name: "Yukchi Buxoro", coords: [39.77, 64.43] },
        { name: "Yukchi Samarqand", coords: [39.65, 66.96] }
      ];

      filiallar.forEach(function (f) {
        var marker = new ymaps.Placemark(
          f.coords,
          { balloonContent: "<b>" + f.name + "</b>" },
          { preset: "islands#blueDeliveryIcon" }
        );
        map.geoObjects.add(marker);
      });
    }
  </script>
