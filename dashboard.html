<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Yukchi.uz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #060d1a;
      --card:     #0d1b2e;
      --card2:    #111f35;
      --border:   #1a2d45;
      --accent:   #2e7eff;
      --accent2:  #00d2ff;
      --green:    #00e676;
      --orange:   #ff9800;
      --red:      #ff4444;
      --text:     #e2eaf7;
      --muted:    #5a7a99;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ─────────────────────────────── */
    .topbar {
      position: fixed; top:0; left:0; right:0; z-index:9999;
      background: rgba(6,13,26,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .topbar .logo img { height:36px; }
    .topbar .logo span { font-size:18px; font-weight:700; color:#fff; }
    .topbar nav a {
      color: var(--muted); text-decoration:none; font-size:14px; font-weight:600;
      padding: 6px 14px; border-radius:8px; transition:.2s;
    }
    .topbar nav a:hover { color:#fff; background: rgba(255,255,255,.06); }
    .topbar .right { display:flex; align-items:center; gap:10px; }
    .topbar .username-badge {
      background: var(--card2); border:1px solid var(--border);
      padding: 6px 14px; border-radius:20px; font-size:13px; font-weight:600; color: var(--accent2);
    }
    .topbar .logout-btn {
      background: transparent; border:1px solid var(--border);
      color: var(--muted); padding: 6px 14px; border-radius:8px;
      font-size:13px; cursor:pointer; transition:.2s;
    }
    .topbar .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── MAIN ────────────────────────────────── */
    .main { padding: 90px 28px 40px; max-width: 1200px; margin: 0 auto; }

    /* ── WELCOME ─────────────────────────────── */
    .welcome {
      background: linear-gradient(135deg, #0a1628 0%, #0d2040 50%, #0a1628 100%);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 36px; margin-bottom: 28px;
      position: relative; overflow: hidden;
    }
    .welcome::before {
      content:''; position:absolute; top:-60px; right:-60px;
      width:220px; height:220px; border-radius:50%;
      background: radial-gradient(circle, rgba(46,126,255,.15), transparent 70%);
    }
    .welcome .role-tag {
      display:inline-block; padding:4px 14px; border-radius:20px;
      font-size:12px; font-weight:700; letter-spacing:.5px; margin-bottom:12px;
      font-family:'JetBrains Mono', monospace;
    }
    .role-tag.user    { background: rgba(0,214,255,.12); color: var(--accent2); border:1px solid rgba(0,214,255,.25); }
    .role-tag.driver  { background: rgba(0,230,118,.12); color: var(--green);   border:1px solid rgba(0,230,118,.25); }
    .welcome h1 { font-size:28px; font-weight:700; margin-bottom:6px; }
    .welcome p  { color: var(--muted); font-size:15px; }

    /* ── STAT CARDS ──────────────────────────── */
    .stats-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
    .stat-card {
      background: var(--card); border:1px solid var(--border);
      border-radius:16px; padding:22px 24px;
      display:flex; align-items:center; gap:16px;
      transition: transform .2s, border-color .2s;
    }
    .stat-card:hover { transform:translateY(-2px); border-color: var(--accent); }
    .stat-icon { font-size:32px; }
    .stat-info .val { font-size:28px; font-weight:700; font-family:'JetBrains Mono',monospace; }
    .stat-info .lbl { font-size:12px; color: var(--muted); margin-top:2px; }
    .val.green  { color: var(--green); }
    .val.blue   { color: var(--accent2); }
    .val.orange { color: var(--orange); }
    .val.red    { color: var(--red); }

    /* ── MENU CARDS ──────────────────────────── */
    .menu-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:20px; margin-bottom:28px; }
    .menu-card {
      background: var(--card); border:1px solid var(--border);
      border-radius:20px; padding:28px; text-decoration:none; color: var(--text);
      display:block; transition: transform .2s, border-color .2s, box-shadow .2s;
      position:relative; overflow:hidden;
    }
    .menu-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background: var(--line-color, var(--accent));
      border-radius:20px 20px 0 0;
    }
    .menu-card:hover {
      transform: translateY(-4px);
      border-color: var(--line-color, var(--accent));
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
      color: var(--text);
    }
    .menu-card .card-icon { font-size:38px; margin-bottom:14px; }
    .menu-card h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
    .menu-card p  { font-size:13px; color: var(--muted); line-height:1.6; }
    .menu-card .arrow {
      position:absolute; bottom:22px; right:22px;
      font-size:20px; opacity:.3; transition:.2s;
    }
    .menu-card:hover .arrow { opacity:1; transform:translate(3px,-3px); }

    /* ── BUYURTMALAR PANEL ───────────────────── */
    .panel {
      background: var(--card); border:1px solid var(--border);
      border-radius:20px; padding:24px; margin-bottom:24px;
    }
    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .panel-header h2 { font-size:18px; font-weight:700; }
    .panel-header a {
      font-size:13px; color: var(--accent); text-decoration:none; font-weight:600;
    }
    .panel-header a:hover { color: var(--accent2); }

    /* Buyurtma qatori */
    .order-row {
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 16px; border-radius:12px; border:1px solid var(--border);
      margin-bottom:10px; transition:.2s; flex-wrap: wrap; gap: 10px;
    }
    .order-row:hover { background: var(--card2); border-color: var(--accent); }
    .order-row .route { font-weight:700; font-size:15px; }
    .order-row .route span { color: var(--accent2); }
    .order-row .cargo { font-size:13px; color: var(--muted); margin-top:3px; }
    .status-pill {
      display:inline-block; padding:5px 14px; border-radius:20px;
      font-size:12px; font-weight:700; white-space: nowrap;
    }
    .order-actions-row { display:flex; gap:8px; flex-wrap:wrap; }
    .action-btn {
      padding:7px 16px; border:none; border-radius:8px;
      font-size:12px; font-weight:700; cursor:pointer; transition:.2s;
    }
    .action-btn:hover { filter:brightness(1.15); transform:translateY(-1px); }
    .btn-accept  { background:#22c55e; color:#fff; }
    .btn-transit { background:#8b5cf6; color:#fff; }
    .btn-deliver { background:#3b82f6; color:#fff; }
    .btn-cancel  { background:#ef4444; color:#fff; }

    .empty-box {
      text-align:center; padding:40px; color: var(--muted);
    }
    .empty-box .big { font-size:36px; margin-bottom:10px; }

    /* ── MONITORING ──────────────────────────── */
    .monitoring-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
    .mon-card {
      background: var(--card2); border:1px solid var(--border); border-radius:14px;
      padding:18px 20px; transition:.2s;
    }
    .mon-card:hover { border-color: var(--accent); }
    .mon-card .label { font-size:12px; color: var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
    .mon-card .value { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; }
    .progress-bar-bg {
      background: var(--border); border-radius:4px; height:6px; margin-top:10px; overflow:hidden;
    }
    .progress-bar-fill { height:100%; border-radius:4px; transition:width .8s ease; }

    /* ── LOADING ─────────────────────────────── */
    .spinner {
      display:inline-block; width:20px; height:20px;
      border:2px solid var(--border); border-top-color: var(--accent);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────── */
    @media(max-width:768px) {
      .topbar nav { display:none; }
      .main { padding: 80px 16px 32px; }
      .welcome h1 { font-size:22px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="topbar">
  <a class="logo" href="truck.html">
    <img src="logistik.png" alt="Logo"/>
    <span>Yukchi.uz</span>
  </a>
  <nav id="dash-nav"></nav>
  <div class="right">
    <span class="username-badge" id="top-username">...</span>
    <button class="logout-btn" onclick="doLogout()">Chiqish</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main-content">
  <div style="text-align:center;padding:80px">
    <div class="spinner"></div>
    <p style="margin-top:16px;color:var(--muted)">Yuklanmoqda...</p>
  </div>
</div>

<script src="api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  if (!isLoggedIn()) {
    window.location.href = "index.html"; return;
  }

  const role     = getRole();
  const username = getUsername();
  const isDriver = role === "Haydovchi" || role === "driver";

  // Top username
  document.getElementById("top-username").textContent = "👤 " + username;

  // Nav
  const navEl = document.getElementById("dash-nav");
  if (isDriver) {
    navEl.innerHTML = `
      <a href="truck.html">🏠 Bosh sahifa</a>
      <a href="dashboard.html" style="color:#fff">📊 Dashboard</a>
      <a href="yukolish.html">📦 Yuk olish</a>
      <a href="buyurtmalar.html">📋 Buyurtmalar</a>
      <a href="profile.html">👤 Profil</a>`;
  } else {
    navEl.innerHTML = `
      <a href="truck.html">🏠 Bosh sahifa</a>
      <a href="dashboard.html" style="color:#fff">📊 Dashboard</a>
      <a href="yukberish.html">🚚 Yuk berish</a>
      <a href="monitoring.html">📍 Monitoring</a>
      <a href="profile.html">👤 Profil</a>`;
  }

  // Buyurtmalarni yukla
  let orders = [];
  try {
    const data = await Orders.getAll();
    if (data.status === "ok") orders = data.data || [];
  } catch(e) {}

  if (isDriver) {
    renderDriverDash(orders, username);
  } else {
    renderUserDash(orders, username);
  }
});

// ═══════════════════════════════════
//  FOYDALANUVCHI DASHBOARD
// ═══════════════════════════════════
function renderUserDash(orders, username) {
  const total     = orders.length;
  const active    = orders.filter(o => ['pending','accepted','in_transit'].includes(o.status)).length;
  const delivered = orders.filter(o => o.status === 'delivered').length;
  const cancelled = orders.filter(o => o.status === 'cancelled').length;

  document.getElementById("main-content").innerHTML = `
    <!-- WELCOME -->
    <div class="welcome">
      <div class="role-tag user">FOYDALANUVCHI</div>
      <h1>Salom, ${username}! 👋</h1>
      <p>Yukchi.uz orqali yuklaringizni tez va ishonchli yetkazing</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-info">
          <div class="val blue">${total}</div>
          <div class="lbl">Jami buyurtmalar</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚛</div>
        <div class="stat-info">
          <div class="val orange">${active}</div>
          <div class="lbl">Faol buyurtmalar</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-info">
          <div class="val green">${delivered}</div>
          <div class="lbl">Yetkazilgan</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">❌</div>
        <div class="stat-info">
          <div class="val red">${cancelled}</div>
          <div class="lbl">Bekor qilingan</div>
        </div>
      </div>
    </div>

    <!-- MENU -->
    <div class="menu-grid">
      <a href="yukberish.html" class="menu-card" style="--line-color:#2e7eff">
        <div class="card-icon">🚚</div>
        <h3>Yuk Berish</h3>
        <p>Yangi buyurtma bering. Manzil, yuk turi, og'irlik va telefon raqamingizni kiriting — biz bog'lanamiz.</p>
        <div class="arrow">→</div>
      </a>
      <a href="monitoring.html" class="menu-card" style="--line-color:#00e676">
        <div class="card-icon">📍</div>
        <h3>Yuk Holati Monitoring</h3>
        <p>Buyurtmalaringiz hozir qayerda ekanligini real vaqtda kuzating. Holat o'zgarishlarini ko'ring.</p>
        <div class="arrow">→</div>
      </a>
      <a href="buyurtmalar.html" class="menu-card" style="--line-color:#ff9800">
        <div class="card-icon">📋</div>
        <h3>Barcha Buyurtmalar</h3>
        <p>Barcha buyurtmalaringiz tarixi. Aktiv, yetkazilgan va bekor qilinganlarni ko'ring.</p>
        <div class="arrow">→</div>
      </a>
      <a href="aloqa.html" class="menu-card" style="--line-color:#ff4444">
        <div class="card-icon">📞</div>
        <h3>Aloqa</h3>
        <p>Muammo yoki savollar bo'lsa — biz doim yordam berishga tayyormiz.</p>
        <div class="arrow">→</div>
      </a>
    </div>

    <!-- FAOL BUYURTMALAR -->
    <div class="panel">
      <div class="panel-header">
        <h2>🔥 Faol buyurtmalar</h2>
        <a href="buyurtmalar.html">Barchasini ko'rish →</a>
      </div>
      <div id="active-orders-list"></div>
    </div>

    <!-- MONITORING PANEL -->
    <div class="panel">
      <div class="panel-header">
        <h2>📊 Buyurtmalar statistikasi</h2>
        <a href="monitoring.html">Batafsil →</a>
      </div>
      <div class="monitoring-grid">
        <div class="mon-card">
          <div class="label">Bajarilish darajasi</div>
          <div class="value green">${total > 0 ? Math.round(delivered/total*100) : 0}%</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${total>0?Math.round(delivered/total*100):0}%;background:#00e676"></div>
          </div>
        </div>
        <div class="mon-card">
          <div class="label">Kutilmoqda</div>
          <div class="value orange">${orders.filter(o=>o.status==='pending').length}</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${total>0?Math.round(orders.filter(o=>o.status==='pending').length/total*100):0}%;background:#ff9800"></div>
          </div>
        </div>
        <div class="mon-card">
          <div class="label">Yo'lda</div>
          <div class="value blue">${orders.filter(o=>o.status==='in_transit').length}</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${total>0?Math.round(orders.filter(o=>o.status==='in_transit').length/total*100):0}%;background:#00d2ff"></div>
          </div>
        </div>
        <div class="mon-card">
          <div class="label">Bekor qilingan</div>
          <div class="value red">${cancelled}</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${total>0?Math.round(cancelled/total*100):0}%;background:#ff4444"></div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Faol buyurtmalar
  const activeOrders = orders.filter(o => ['pending','accepted','in_transit'].includes(o.status));
  renderOrderList('active-orders-list', activeOrders, false);
}

// ═══════════════════════════════════
//  HAYDOVCHI DASHBOARD
// ═══════════════════════════════════
function renderDriverDash(orders, username) {
  const myOrders  = orders.filter(o => o.driver === username);
  const available = orders.filter(o => o.status === 'pending').length;
  const myActive  = myOrders.filter(o => ['accepted','in_transit'].includes(o.status)).length;
  const delivered = myOrders.filter(o => o.status === 'delivered').length;
  const earnings  = myOrders.filter(o=>o.status==='delivered').reduce((s,o)=> s+(parseFloat(o.price)||0),0);

  document.getElementById("main-content").innerHTML = `
    <!-- WELCOME -->
    <div class="welcome">
      <div class="role-tag driver">HAYDOVCHI</div>
      <h1>Salom, ${username}! 🚛</h1>
      <p>Bugun ham omadli safarlar! Yangi buyurtmalar sizi kutmoqda.</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-info">
          <div class="val orange">${available}</div>
          <div class="lbl">Mavjud buyurtmalar</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚛</div>
        <div class="stat-info">
          <div class="val blue">${myActive}</div>
          <div class="lbl">Mening faol reyslari</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-info">
          <div class="val green">${delivered}</div>
          <div class="lbl">Yetkazilgan</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <div class="val green">${earnings > 0 ? (earnings/1000000).toFixed(1)+'M' : '—'}</div>
          <div class="lbl">Umumiy daromad</div>
        </div>
      </div>
    </div>

    <!-- MENU -->
    <div class="menu-grid">
      <a href="yukolish.html" class="menu-card" style="--line-color:#00e676">
        <div class="card-icon">📦</div>
        <h3>Yuk Olish</h3>
        <p>Mavjud yuklar ro'yxatini ko'ring. O'zingizga mos yo'nalishni tanlang va buyurtmani qabul qiling.</p>
        <div class="arrow">→</div>
      </a>
      <a href="buyurtmalar.html" class="menu-card" style="--line-color:#2e7eff">
        <div class="card-icon">🗂️</div>
        <h3>Barcha Buyurtmalar</h3>
        <p>Pending buyurtmalar va o'zingiz qabul qilgan reyslarnini boshqaring.</p>
        <div class="arrow">→</div>
      </a>
      <a href="xarita.html" class="menu-card" style="--line-color:#ff9800">
        <div class="card-icon">🗺️</div>
        <h3>Xarita</h3>
        <p>Yaqin atrofdagi buyurtmalar va yo'nalishlarni xaritada ko'ring.</p>
        <div class="arrow">→</div>
      </a>
      <a href="profile.html" class="menu-card" style="--line-color:#8b5cf6">
        <div class="card-icon">👤</div>
        <h3>Profil</h3>
        <p>Shaxsiy ma'lumotlaringizni, mashina raqami va hujjatlaringizni yangilang.</p>
        <div class="arrow">→</div>
      </a>
    </div>

    <!-- YUK MA'LUMOTLARI -->
    <div class="panel">
      <div class="panel-header">
        <h2>🆕 Yangi buyurtmalar</h2>
        <a href="buyurtmalar.html">Barchasini ko'rish →</a>
      </div>
      <div id="new-orders-list"></div>
    </div>

    <!-- MENING REYSLARI -->
    <div class="panel">
      <div class="panel-header">
        <h2>🚛 Mening faol reyslari</h2>
      </div>
      <div id="my-orders-list"></div>
    </div>

    <!-- REYSLAR STATISTIKASI -->
    <div class="panel">
      <div class="panel-header"><h2>📈 Reyslar statistikasi</h2></div>
      <div class="monitoring-grid">
        <div class="mon-card">
          <div class="label">Qabul qilish foizi</div>
          <div class="value green">${orders.length>0?Math.round(myOrders.length/Math.max(orders.length,1)*100):0}%</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${orders.length>0?Math.round(myOrders.length/Math.max(orders.length,1)*100):0}%;background:#00e676"></div>
          </div>
        </div>
        <div class="mon-card">
          <div class="label">Jami reyslar</div>
          <div class="value blue">${myOrders.length}</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:100%;background:#2e7eff"></div>
          </div>
        </div>
        <div class="mon-card">
          <div class="label">Muvaffaqiyatli</div>
          <div class="value green">${delivered}</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${myOrders.length>0?Math.round(delivered/myOrders.length*100):0}%;background:#00e676"></div>
          </div>
        </div>
        <div class="mon-card">
          <div class="label">Mavjud yuklar</div>
          <div class="value orange">${available}</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${Math.min(available*10,100)}%;background:#ff9800"></div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Yangi (pending) buyurtmalar
  const newOrders = orders.filter(o => o.status === 'pending').slice(0,5);
  renderOrderList('new-orders-list', newOrders, true);

  // Mening faol reyslari
  const myActive2 = myOrders.filter(o => ['accepted','in_transit'].includes(o.status));
  renderOrderList('my-orders-list', myActive2, true, true);
}

// ═══════════════════════════════════
//  BUYURTMA RO'YXATI RENDER
// ═══════════════════════════════════
function renderOrderList(containerId, orders, isDriver, isMyOrders) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (!orders.length) {
    el.innerHTML = `<div class="empty-box"><div class="big">📭</div><p>Hozircha bo'sh</p></div>`;
    return;
  }

  el.innerHTML = orders.map(o => {
    const color = {'pending':'#ff9800','accepted':'#3b82f6','in_transit':'#8b5cf6','delivered':'#22c55e','cancelled':'#ef4444'}[o.status] || '#888';
    const sText = {'pending':'⏳ Kutilmoqda','accepted':'✅ Qabul qilindi','in_transit':'🚛 Yo\'lda','delivered':'📦 Yetkazildi','cancelled':'❌ Bekor qilindi'}[o.status] || o.status;
    const date  = new Date(o.created_at).toLocaleDateString('uz-UZ');

    let actions = '';
    if (isDriver) {
      if (o.status === 'pending' && !isMyOrders) {
        actions = `<button class="action-btn btn-accept" onclick="changeStatus(${o.id},'accepted')">✅ Qabul</button>`;
      } else if (o.status === 'accepted' && o.driver === getUsername()) {
        actions = `<button class="action-btn btn-transit" onclick="changeStatus(${o.id},'in_transit')">🚛 Yo'lga</button>`;
      } else if (o.status === 'in_transit' && o.driver === getUsername()) {
        actions = `<button class="action-btn btn-deliver" onclick="changeStatus(${o.id},'delivered')">📦 Yetkazildi</button>`;
      }
    } else {
      if (o.status === 'pending') {
        actions = `<button class="action-btn btn-cancel" onclick="changeStatus(${o.id},'cancelled')">❌ Bekor</button>`;
      }
    }

    return `
    <div class="order-row" id="ord-${o.id}">
      <div>
        <div class="route"><span>${o.from_city}</span> → <span>${o.to_city}</span></div>
        <div class="cargo">${o.cargo||'—'} ${o.phone !== '-' ? '· 📞 '+o.phone : ''} · 📅 ${date}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="status-pill" style="background:${color}20;color:${color};border:1px solid ${color}40">${sText}</span>
        ${actions ? `<div class="order-actions-row">${actions}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function changeStatus(id, status) {
  try {
    const data = await Orders.updateStatus(id, status);
    if (data.status === "ok") {
      showMessage("Holat yangilandi!");
      setTimeout(() => location.reload(), 800);
    } else {
      showMessage(data.message || "Xatolik!", "error");
    }
  } catch(e) {
    showMessage("Xatolik yuz berdi!", "error");
  }
}

function doLogout() {
  Auth.logout();
}
</script>
