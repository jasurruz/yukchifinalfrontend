<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyurtmalar - Yukchi.uz</title>
    <link rel="stylesheet" href="buyurtmalar.css">
    <style>
        .orders-grid { display: grid; gap: 16px; margin-top: 20px; }
        .order-card {
            background: #1a2332; border-radius: 12px; padding: 20px;
            border: 1px solid #2d3f55; position: relative;
        }
        .order-card h3 { margin: 0 0 10px; color: #7dd3fc; font-size: 16px; }
        .order-card p  { margin: 4px 0; color: #cbd5e1; font-size: 14px; }
        .order-card .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 12px;
        }
        .order-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
        .order-actions button {
            padding: 8px 16px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: .2s;
        }
        .btn-accept   { background: #22c55e; color: #fff; }
        .btn-transit  { background: #8b5cf6; color: #fff; }
        .btn-deliver  { background: #3b82f6; color: #fff; }
        .btn-cancel   { background: #ef4444; color: #fff; }
        .btn-accept:hover   { background: #16a34a; }
        .btn-transit:hover  { background: #7c3aed; }
        .btn-deliver:hover  { background: #2563eb; }
        .btn-cancel:hover   { background: #dc2626; }
        .empty-state {
            text-align: center; padding: 60px 20px; color: #64748b;
        }
        .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 20px; border-radius: 20px; border: none;
            background: #1e2d3d; color: #94a3b8; cursor: pointer;
            font-size: 13px; font-weight: 600; transition: .2s;
        }
        .tab-btn.active { background: #3b82f6; color: #fff; }
        #loading { text-align: center; padding: 40px; color: #64748b; }
        .route { font-size: 16px; font-weight: 700; color: #e2e8f0; }
        .route span { color: #7dd3fc; }
    </style>
</head>
<body>

<header>
    <div><img src="logistik.png" alt="Logo" width="180"></div>
    <h1>Yukchi.uz Kompaniyasi</h1>
    <div>
        <a href="#" class="auth-link">Kirish</a>
        <button onclick="window.location.href='profile.html'" class="profile-btn">Profil</button>
    </div>
</header>

<nav>
    <a href="truck.html">Bosh sahifa</a>
    <a href="yukolish.html" id="nav-yukolish">Yuk-olish</a>
    <a href="yukberish.html" id="nav-yukberish">Yuk-berish</a>
    <a href="filiallar.html">Filiallar</a>
    <a href="aloqa.html">Aloqa</a>
    <a href="xarita.html">Xarita</a>
</nav>

<main>
    <h2 id="page-title">Buyurtmalar</h2>

    <div class="tabs" id="tabs-container" style="display:none">
        <button class="tab-btn active" onclick="filterOrders('all')">Barchasi</button>
        <button class="tab-btn" onclick="filterOrders('pending')">⏳ Kutilmoqda</button>
        <button class="tab-btn" onclick="filterOrders('accepted')">✅ Qabul qilingan</button>
        <button class="tab-btn" onclick="filterOrders('in_transit')">🚛 Yo'lda</button>
        <button class="tab-btn" onclick="filterOrders('delivered')">📦 Yetkazildi</button>
    </div>

    <div id="loading">⏳ Yuklanmoqda...</div>
    <div class="orders-grid" id="orders-list"></div>
</main>

<script src="api.js"></script>
<script>
let allOrders = [];
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', async function () {
    updateNav();

    if (!isLoggedIn()) {
        showMessage("Buyurtmalarni ko'rish uchun kiring!", "error");
        setTimeout(() => { window.location.href = "index.html"; }, 1500);
        return;
    }

    const role = getRole();

    // Sahifa sarlavhasi
    if (role === "Haydovchi" || role === "driver") {
        document.getElementById("page-title").textContent = "🚛 Mavjud buyurtmalar";
        document.getElementById("tabs-container").style.display = "flex";
    } else {
        document.getElementById("page-title").textContent = "📦 Mening buyurtmalarim";
    }

    await loadOrders();

    // URL parametrlaridan buyurtma ko'rsatish (yukolish.html dan kelsa)
    const params = new URLSearchParams(window.location.search);
    if (params.get('manzil')) {
        showUrlOrder(params);
    }
});

async function loadOrders() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("orders-list").innerHTML = "";

    try {
        const data = await Orders.getAll();
        if (data.status === "ok") {
            allOrders = data.data || [];
            renderOrders(allOrders);
        } else {
            showMessage("Buyurtmalarni yuklashda xatolik!", "error");
        }
    } catch (e) {
        showMessage("Server bilan aloqa yo'q!", "error");
    } finally {
        document.getElementById("loading").style.display = "none";
    }
}

function filterOrders(status) {
    currentFilter = status;
    // Tab stilini yangilash
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
    renderOrders(filtered);
}

function renderOrders(orders) {
    const container = document.getElementById("orders-list");
    const role = getRole();

    if (!orders.length) {
        container.innerHTML = `
            <div class="empty-state">
                <h3>📭 Buyurtma yo'q</h3>
                <p>Hozircha bu yerda hech narsa ko'rinmayapti</p>
            </div>`;
        return;
    }

    container.innerHTML = orders.map(order => {
        const color = statusColor(order.status);
        const sText = statusText(order.status);
        const date  = new Date(order.created_at).toLocaleDateString('uz-UZ');

        // Haydovchi uchun tugmalar
        let actions = '';
        if (role === "Haydovchi" || role === "driver") {
            if (order.status === 'pending') {
                actions = `<button class="btn-accept" onclick="changeStatus(${order.id}, 'accepted')">✅ Qabul qilish</button>
                           <button class="btn-cancel" onclick="changeStatus(${order.id}, 'cancelled')">❌ Rad etish</button>`;
            } else if (order.status === 'accepted' && order.driver === getUsername()) {
                actions = `<button class="btn-transit" onclick="changeStatus(${order.id}, 'in_transit')">🚛 Yo'lga chiqish</button>`;
            } else if (order.status === 'in_transit' && order.driver === getUsername()) {
                actions = `<button class="btn-deliver" onclick="changeStatus(${order.id}, 'delivered')">📦 Yetkazildi</button>`;
            }
        } else {
            // Mijoz uchun
            if (order.status === 'pending') {
                actions = `<button class="btn-cancel" onclick="changeStatus(${order.id}, 'cancelled')">❌ Bekor qilish</button>`;
            }
        }

        return `
        <div class="order-card" id="order-${order.id}">
            <div class="status-badge" style="background:${color}">${sText}</div>
            <div class="route">
                <span>${order.from_city}</span> → <span>${order.to_city}</span>
            </div>
            <p>📦 Yuk: ${order.cargo || '—'}</p>
            <p>📞 Telefon: ${order.phone}</p>
            ${order.driver ? `<p>🚛 Haydovchi: ${order.driver}</p>` : ''}
            ${order.price ? `<p>💰 Narx: ${Number(order.price).toLocaleString()} so'm</p>` : ''}
            <p style="color:#475569;font-size:12px">📅 ${date}</p>
            ${actions ? `<div class="order-actions">${actions}</div>` : ''}
        </div>`;
    }).join('');
}

async function changeStatus(id, status) {
    try {
        const data = await Orders.updateStatus(id, status);
        if (data.status === "ok") {
            showMessage("Holat yangilandi!");
            await loadOrders();
        } else {
            showMessage(data.message || "Xatolik!", "error");
        }
    } catch (e) {
        showMessage("Xatolik yuz berdi!", "error");
    }
}

// URL parametrlaridan buyurtma tafsilotlari (yukolish.html dan)
function showUrlOrder(params) {
    const div = document.createElement('div');
    div.className = 'order-card';
    div.style.borderColor = '#3b82f6';
    div.innerHTML = `
        <div class="status-badge" style="background:#3b82f6">🆕 Yangi tanlangan</div>
        <div class="route">
            <span>${decodeURIComponent(params.get('manzil') || '')}</span>
        </div>
        <p>📏 Masofa: ${params.get('masofa') || '—'}</p>
        <p>⏱ Vaqt: ${params.get('vaqt') || '—'}</p>
        <p>📦 Yuk turi: ${decodeURIComponent(params.get('yukTuri') || '—')}</p>
        <p>💰 Narx: ${Number(params.get('narx') || 0).toLocaleString()} so'm</p>
    `;
    document.getElementById("orders-list").prepend(div);
}
</script>

</body>
</html>
